<!DOCTYPE html>
<html>
<head>
<title>FIREWAL ATM </title>
<link rel="icon" type="icon" href="firewalicon.jpeg">
<style>
body{
 background:linear-gradient(#141e30,#243b55);
 font-family:Arial;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 margin:0;
}

.atm-container{
 display:flex;
 width:820px;
 gap:20px;
 background:#d9d9d9;
 padding:20px;
 border-radius:15px;
 box-shadow:0 20px 40px rgba(0,0,0,0.5);
 position:relative;
}

.left{ flex:2; display:flex; flex-direction:column; }

.screen{
 background:#0f2436;
 color:white;
 height:200px;
 padding:20px;
 border-radius:6px;
 font-size:24px;
}

@keyframes flashRed{
0%{background:#0f2436;}
25%{background:#7a0000;}
50%{background:#c40000;}
75%{background:#7a0000;}
100%{background:#0f2436;}
}

.flash-error{ animation:flashRed 0.6s; }

.inputBox{
 background:white;
 color:black;
 padding:15px;
 margin-top:10px;
 font-size:24px;
border-radius: 10px;
}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:15px;
}

.keypad button{
padding:20px;
font-size:22px;
cursor:pointer;
}

.right{
 flex:1;
 display:flex;
 flex-direction:column;
 align-items:center;
}

.card-slot{
 width:160px;
 height:18px;
 background:#111;
 margin-bottom:40px;
 border-radius:6px;
 box-shadow:inset 0 2px 5px rgba(0,0,0,0.6);
}

.card{
 position: fixed;
 z-index: 9999;
 width:120px;
 height:70px;
 background:linear-gradient(#ccc,#999);
 border-radius:8px;
 display:flex;
 justify-content:center;
 align-items:center;
 cursor:pointer;
 font-weight:bold;
 top:350px;
 left:350px;
 transition: all 0.6s ease;
}

.card.inserted{
 transform:translateY(-260px) scale(0.9);
 opacity:0.7;
}

.receipt{
 position:absolute;
 right:80px;
 top:-300px;
 width:200px;
 background:white;
 padding:10px;
 font-family:monospace;
 border:1px dashed #aaa;
 transition:top 1s;
 max-height:300px;
 overflow:auto;
}
</style>
</head>

<body>

<div class="atm-container">

<div class="left">
<div class="screen" id="screen"><h3>Insert Card</h3></div>
<div class="keypad" id="keypad"> <input type="password" class="input-field" id="pinInput" placeholder="Enter 6-digit PIN" maxlength="6"></div>
</div>

<div class="right">
<div class="card-slot" id="slot"></div>
<button onclick="showReceipt()">Receipt</button>
</div>

</div>

<div class="card" id="card">💳 CARD</div>
<div class="receipt" id="receipt"></div>

<script>

let correctPin="123456";
let balance=1000;
let attempts=0;
let locked=false;
let mode="card";
let input="";
let history=[];
let tempPin="";
let shuffleNext=false;

const screen=document.getElementById("screen");
const keypad=document.getElementById("keypad");
const card=document.getElementById("card");
const slot=document.getElementById("slot");
const receipt=document.getElementById("receipt");

function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

function createKeypad(){

keypad.innerHTML="";

let nums=["1","2","3","4","5","6","7","8","9","0"];

if(shuffleNext){
nums=shuffle(nums);
shuffleNext=false;
}

let layout=[...nums,"C","✔"];

layout.forEach(n=>{

const btn=document.createElement("button");

btn.innerText=n;

if(n==="C") btn.onclick=clearInput;
else if(n==="✔") btn.onclick=enterKey;
else btn.onclick=()=>press(n);

keypad.appendChild(btn);

});

}

createKeypad();


function press(n){

let limit=100;

if(mode==="pin" || mode==="changePin" || mode==="confirmPin"){
limit = 6;
}

if(input.length >= limit){
return;
}

input+=n;

let d=document.getElementById("display");

if(d){

if(mode==="pin" || mode==="changePin" || mode==="confirmPin"){
d.innerText="*".repeat(input.length);
}else{
d.innerText=input;
}

}

}

function clearInput(){
input="";
let d=document.getElementById("display");
if(d)d.innerText="";
}

/*CARD DRAG*/

let isDragging=false;
let offsetX=0;
let offsetY=0;

card.addEventListener("mousedown",(e)=>{
isDragging=true;
offsetX=e.clientX-card.offsetLeft;
offsetY=e.clientY-card.offsetTop;
card.style.transition="none";
});

document.addEventListener("mousemove",(e)=>{
if(!isDragging)return;
card.style.left=(e.clientX-offsetX)+"px";
card.style.top=(e.clientY-offsetY)+"px";
});

document.addEventListener("mouseup",()=>{

if(!isDragging)return;

isDragging=false;
card.style.transition="all 0.6s ease";

let c=card.getBoundingClientRect();
let s=slot.getBoundingClientRect();
let buffer=50;

if(
c.left+c.width/2>s.left-buffer &&
c.left+c.width/2<s.right+buffer &&
c.top+c.height/2>s.top-buffer &&
c.top+c.height/2<s.bottom+buffer
){
card.classList.add("inserted");
setTimeout(startATM,500);
}
else{
card.style.top="350px";
card.style.left="350px";
}

});

function startATM(){

if(locked){
screen.innerHTML="<h3>ATM LOCKED</h3>";
return;
}

mode="pin";
input="";

screen.innerHTML=`<h3>Enter 6 Digit PIN</h3>
<div class="inputBox" id="display"></div>`;

createKeypad();

}

function enterKey(){

if(mode==="pin"){

if(input===correctPin && input.length >= 6 ){
attempts=0;
showMenu();
}

else{

attempts++;

screen.innerHTML=`<h3>Wrong PIN Attempt ${attempts}</h3>
<div class="inputBox" id="display"></div>`;

screen.classList.add("flash-error");
setTimeout(()=>screen.classList.remove("flash-error"),600);

shuffleNext=true;
createKeypad();

if(attempts>=3){
locked=true;
screen.innerHTML="<h3>ATM LOCKED</h3>";
keypad.innerHTML="";
}

}

input="";
return;

}

if(mode==="deposit"){

let amt=parseInt(input);

if(isNaN(amt)||amt<=0){
alert("Invalid amount");
return;
}

balance+=amt;
history.push(`Deposit ₱${amt} | Balance ₱${balance}`);
finishTransaction();
return;

}

if(mode==="withdraw"){

let amt=parseInt(input);

if(isNaN(amt)||amt<=0){
alert("Invalid amount");
return;
}

if(amt>balance){
alert("Insufficient balance");
return;
}

balance-=amt;
history.push(`Withdraw ₱${amt} | Balance ₱${balance}`);
finishTransaction();
return;

}

if(mode==="changePin"){

if(input.length!==6){
alert("PIN must be 6 digits");
return;
}

tempPin=input;
mode="confirmPin";

screen.innerHTML=`<h3>Confirm New PIN</h3>
<div class="inputBox" id="display"></div>`;

input="";
return;

}

if(mode==="confirmPin"){

if(input===tempPin){
correctPin=tempPin;
alert("PIN Changed");
}
else{
alert("PIN does not match");
}

finishTransaction();
return;

}

}

function finishTransaction(){
shuffleNext=true;
createKeypad();
askReceipt();
input="";
}

function showMenu(){

mode="menu";

screen.innerHTML=`<h3>ATM MENU</h3>

<button onclick="deposit()">Deposit</button>
<button onclick="withdraw()">Withdraw</button>
<button onclick="showBalance()">Balance</button>
<button onclick="changePin()">Change PIN</button>
<button onclick="logout()">Logout</button>

`;

}

function deposit(){
mode="deposit";
screen.innerHTML=`<h3>Enter Deposit Amount</h3>
<div class="inputBox" id="display"></div>`;
}

function withdraw(){
mode="withdraw";
screen.innerHTML=`<h3>Enter Withdraw Amount</h3>
<div class="inputBox" id="display"></div>`;
}

function showBalance(){
history.push(`Balance Inquiry | Balance ₱${balance}`);
finishTransaction();
}

function changePin(){
mode="changePin";
input="";
screen.innerHTML=`<h3>Enter New PIN</h3>
<div class="inputBox" id="display"></div>`;
}

function logout(){
mode="card";
card.classList.remove("inserted");
card.style.top="350px";
card.style.left="350px";
screen.innerHTML="<h3>Insert Card</h3>";
}

function askReceipt(){
screen.innerHTML+=`
<br>
<button onclick="showReceipt()">Print Receipt</button>
<button onclick="showMenu()">No Receipt</button>
`;
}

function showReceipt(){

let html=`<h3>Receipt</h3>`;

history.forEach(h=>{
html+=`<p>${h}</p>`;
});

html+=`<button onclick='closeReceipt()'>Close</button>`;

receipt.innerHTML=html;
receipt.style.top="120px";

}

function closeReceipt(){

receipt.style.top="-300px";

if(mode!=="card" && !locked){
showMenu();
}
else{
logout();
}

}

</script>

</body>

</html>
