<!DOCTYPE html>
<html>
<head>
<title>FIREWAL ATM </title>
<link rel="icon" type="icon" href="firewalicon.png">
<link rel="stylesheet" href="styles.css"> 

</head>

<body>

<div class="atm-container">

<div class="left">
<div class="screen" id="screen"><h3>Insert Card</h3></div>
<div class="keypad" id="keypad"> <input type="password" class="input-field" id="pinInput" placeholder="Enter 6-digit PIN" maxlength="6"></div>
</div>

<div class="right">
<div class="card-slot" id="slot"></div>
<button onclick="showReceipt()">Receipt</button>
</div>

</div>

<div class="card" id="card">💳 CARD</div>
<div class="receipt" id="receipt"></div>

  <script src="script.js"></script>
</body>

</html>
